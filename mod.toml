name = "undertale_preset"
version = "0.1.0"
authors = ["SoupRune Contributors"]
description = "Undertale-style game preset for SoupRune — reusable views, FRE rules, sequences, and WASM behaviors."

# This is a library mod, not a standalone game.
# 这是一个库 mod，不是独立游戏。
entry_point = false

# Resource directories configuration
# 资源目录配置
[resources]
textures = "assets/textures"
audios = "assets/audios"
fonts = "assets/fonts"

[dependencies]
# No dependencies — this is the base library.

[mod_library]
# WASM component file containing RedSoul and FightBar behaviors
# WASM 组件文件，包含红魂和攻击条行为
wasm = "undertale_preset.wasm"

[game]
global_rules = "global.fre.ron"
player_behavior_path = "states/overworld/players/player_behavior.ron"
input_config_path = "config/input.ron"
states_config = "config/states.ron"
overworld_rules = ["states/overworld/rules/interaction.fre.ron"]
